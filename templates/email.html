<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Brief &mdash; {{ date_str }}</title>
</head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f2f5;">
    <tr>
      <td align="center" style="padding:24px 16px;">

        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

          <!-- ── Header ──────────────────────────────────────────────── -->
          <tr>
            <td style="background:#3b6ef0;padding:28px 32px;">
              <div style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.3px;">Daily Brief</div>
              <div style="color:#c5d6ff;font-size:13px;margin-top:4px;">{{ date_str }}</div>
            </td>
          </tr>

          <!-- ── Stories ─────────────────────────────────────────────── -->
          {% for story in stories %}
          <tr>
            <td style="padding:24px 32px;{% if not loop.last %}border-bottom:1px solid #eeeeee;{% endif %}">

              <!-- Topic pill + optional wildcard badge -->
              <div style="margin-bottom:10px;">
                <span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;background:#3b6ef0;color:#ffffff;">{{ story.topic }}</span>
                {% if story.is_wildcard %}
                <span style="display:inline-block;margin-left:6px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;background:#e07820;color:#ffffff;">Wildcard</span>
                {% endif %}
              </div>

              <!-- Headline -->
              <div style="font-size:18px;font-weight:700;color:#222222;line-height:1.3;margin-bottom:10px;">{{ story.title }}</div>

              <!-- Summary -->
              <div style="font-size:15px;color:#444444;line-height:1.5;margin-bottom:14px;">{{ story.summary }}</div>

              <!-- Read-more link -->
              <a href="{{ story.url }}" style="font-size:13px;color:#3b6ef0;text-decoration:none;">Read more at {{ story.source }} &rarr;</a>

            </td>
          </tr>
          {% endfor %}

          <!-- ── Footer ──────────────────────────────────────────────── -->
          <tr>
            <td style="padding:18px 32px;background:#f8f8f8;border-top:1px solid #eeeeee;">
              <div style="font-size:12px;color:#aaaaaa;">Generated {{ run_timestamp }} &middot; daily-news-brief</div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
